services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: studio-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  # Unified Server (all backend modules)
  unified-server:
    build:
      context: .
      dockerfile: apps/platform/servers/unified/Dockerfile.prod
    container_name: studio-unified-server
    environment:
      - NODE_ENV=production
      - UNIFIED_PORT=3010
      - JWT_SECRET=${JWT_SECRET}
      - APP_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/app
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-scaleway}
      - SCALEWAY_API_KEY=${SCALEWAY_API_KEY}
      - SCALEWAY_BASE_URL=${SCALEWAY_BASE_URL}
      - SCALEWAY_EMBEDDING_MODEL=${SCALEWAY_EMBEDDING_MODEL}
      - SCALEWAY_CHAT_MODEL=${SCALEWAY_CHAT_MODEL}
      - CONFLUENCE_BASE_URL=${CONFLUENCE_BASE_URL}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - JIRA_OAUTH_CLIENT_ID=${JIRA_OAUTH_CLIENT_ID}
      - JIRA_OAUTH_CLIENT_SECRET=${JIRA_OAUTH_CLIENT_SECRET}
      - JIRA_OAUTH_CALLBACK_URL=${JIRA_OAUTH_CALLBACK_URL}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
      - proxy-network

  # Platform Client (SPA)
  platform-client:
    build:
      context: .
      dockerfile: apps/platform/Dockerfile.prod
    container_name: studio-platform-client
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network
      - proxy-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
  proxy-network:
    external: true
